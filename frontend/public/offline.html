<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UNMAPPED — Offline</title>
    <meta name="theme-color" content="#0b3d91" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f8fafc;
        --fg: #0f172a;
        --muted: #475569;
        --primary: #0b3d91;
        --card: #ffffff;
        --border: #e2e8f0;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b1220;
          --fg: #f8fafc;
          --muted: #94a3b8;
          --primary: #6ea8ff;
          --card: #111a2e;
          --border: #1f2a44;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          sans-serif;
        background: var(--bg);
        color: var(--fg);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }
      main {
        max-width: 32rem;
        width: 100%;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 2rem;
        text-align: center;
        box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
      }
      .icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 1rem;
        border-radius: 50%;
        background: rgba(11, 61, 145, 0.1);
        color: var(--primary);
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.5rem;
        line-height: 1.25;
      }
      p {
        margin: 0.25rem 0;
        color: var(--muted);
        line-height: 1.5;
      }
      .actions {
        margin-top: 1.5rem;
        display: flex;
        justify-content: center;
        gap: 0.75rem;
        flex-wrap: wrap;
      }
      button,
      a.btn {
        appearance: none;
        border: 1px solid var(--border);
        background: var(--primary);
        color: #fff;
        font-weight: 600;
        font-size: 0.9rem;
        padding: 0.6rem 1.1rem;
        border-radius: 8px;
        cursor: pointer;
        text-decoration: none;
        transition: opacity 150ms ease;
      }
      a.btn.secondary {
        background: transparent;
        color: var(--fg);
      }
      button:hover,
      a.btn:hover {
        opacity: 0.9;
      }
      .footnote {
        margin-top: 1.25rem;
        font-size: 0.75rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main role="alert" aria-live="polite">
      <div class="icon" aria-hidden="true">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="32"
          height="32"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M1 1l22 22" />
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
          <path d="M10.71 5.05A16 16 0 0 1 22.58 9" />
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
          <line x1="12" y1="20" x2="12.01" y2="20" />
        </svg>
      </div>
      <h1>You're offline</h1>
      <p>
        UNMAPPED can't reach the analysis backend right now. Any results you
        already loaded are still available locally.
      </p>
      <p>Reconnect and try again — your skill description has been saved.</p>
      <div class="actions">
        <button type="button" onclick="location.reload()">Try again</button>
        <a class="btn secondary" href="/">Go home</a>
      </div>
      <p class="footnote">
        UNMAPPED · World Bank hackathon — works offline thanks to a service
        worker cache.
      </p>
    </main>
  </body>
</html>
