# Shared sector catalogue (ISIC Rev.4 → ILOSTAT classif1 codes → ISCO-08 hint codes).
#
# Country YAMLs reference these by `code` in their `sectors_of_interest` list.
# Adding a new sector here makes it available to every country.

sectors:
